---
name: Trigger CodeRabbit for Bot PRs
on:
  pull_request_target:
    types: [opened]

permissions:
  contents: write
  pull-requests: write

jobs:
  trigger-review:
    uses: submariner-io/submariner-bot/.github/workflows/coderabbit-trigger.yml@devel
    with:
      pr_number: ${{ github.event.pull_request.number }}
    secrets: inherit
